<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - AI Resume Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            background: linear-gradient(rgba(15,23,42,0.94), rgba(15,23,42,0.97)),
            url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f?q=80&w=2071&auto=format&fit=crop');
            background-size: cover; background-position: center; background-attachment: fixed;
            min-height: 100vh; color: #f8fafc; padding-bottom: 60px;
        }
        .navbar { background: rgba(0,0,0,0.4); backdrop-filter: blur(12px); padding: 18px 40px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .navbar-brand { font-size: 28px; font-weight: 700; color: #38bdf8 !important; }
        .nav-link { color: white !important; margin-left: 15px; }
        .content-container { max-width: 800px; margin: 50px auto; padding: 0 20px; }
        .glass-card {
            background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        .form-control { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.05); color: white !important; padding: 12px; border-radius: 10px; }
        .form-control:focus { background: rgba(255, 255, 255, 0.15); border-color: #38bdf8; box-shadow: 0 0 10px rgba(56, 189, 248, 0.2); }
        .submit-btn { width: 100%; padding: 14px; border: none; border-radius: 12px; background: #38bdf8; color: #0f172a; font-weight: 600; transition: all 0.3s; }
        .submit-btn:hover { background: #0ea5e9; box-shadow: 0 8px 20px rgba(56, 189, 248, 0.3); }
        .btn-back { background: transparent; border: 1px solid #38bdf8; color: #38bdf8; padding: 10px 24px; border-radius: 10px; text-decoration: none; }
        .btn-back:hover { background: #38bdf8; color: #0f172a; }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="{{ url_for('home') }}">AI Resume Analyzer</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="{{ url_for('home') }}">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('about') }}">About</a></li>
                <li class="nav-item"><a class="nav-link active" href="{{ url_for('contact') }}">Contact</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container content-container">
    <div class="glass-card">
        <div class="d-flex justify-content-between align-items-start flex-wrap gap-3 mb-4">
            <div>
                <h1 style="font-weight: 700; color: #38bdf8;" class="mb-1">Get in Touch</h1>
                <p class="text-muted mb-0">Have questions or feedback? Drop us a message.</p>
            </div>
            <a href="{{ url_for('home') }}" class="btn-back">← Back</a>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-success alert-dismissible fade show" role="alert" style="background: rgba(74, 222, 128, 0.1); border:none; color:#4ade80;">
                        <i class="fas fa-check-circle me-2"></i> {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('contact') }}" method="POST">
            <div class="row">
                <div class="col-md-6">
                    <label>Full Name</label>
                    <input type="text" name="name" class="form-control mt-2" placeholder="John Doe" required>
                </div>
                <div class="col-md-6">
                    <label>Email Address</label>
                    <input type="email" name="email" class="form-control mt-2" placeholder="name@example.com" required>
                </div>
            </div>
            <label class="mt-3">Subject</label>
            <input type="text" name="subject" class="form-control mt-2" placeholder="How can we help you?" required>
            <label class="mt-3">Message</label>
            <textarea name="message" class="form-control mt-2" rows="5" placeholder="Type your message details here..." required></textarea>
            <button type="submit" class="submit-btn mt-4">Send Message</button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
