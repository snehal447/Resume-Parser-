<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Parser AI</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
}

.container{
    width:450px;
    background:white;
    border-radius:20px;
    box-shadow:0 20px 40px rgba(0,0,0,0.2);
    padding:40px;
    text-align:center;
}

.container h1{
    color:#4e73df;
    margin-bottom:15px;
}

.container p{
    color:#555;
    margin-bottom:25px;
}

.upload-box{
    border:2px dashed #4e73df;
    padding:25px;
    border-radius:15px;
    margin-bottom:20px;
    background:#f8f9fc;
}

input[type="file"]{
    width:100%;
    padding:10px;
    border:none;
    background:none;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#1cc88a,#36b9cc);
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.03);
}

#loading{
    display:none;
    margin-top:15px;
    color:#4e73df;
    font-weight:bold;
}

.message{
    margin-top:15px;
    color:red;
    font-weight:bold;
}

@media(max-width:500px){
    .container{
        width:90%;
    }
}
</style>
</head>

<body>

<div class="container">

    <h1>📄 Resume Parser AI</h1>
    <p>Upload your resume and get AI-based prediction instantly</p>

    <form action="/pred" method="post" enctype="multipart/form-data" onsubmit="showLoader()">

        <div class="upload-box">
            <input type="file" name="resume" accept=".pdf,.txt" required>
        </div>

        <button type="submit">Upload & Analyze</button>

        <p id="loading">⏳ Analyzing Resume...</p>

    </form>

    {% if message %}
    <p class="message">{{ message }}</p>
    {% endif %}

</div>

<script>
function showLoader(){
    document.getElementById("loading").style.display="block";
}
</script>

</body>
</html>
