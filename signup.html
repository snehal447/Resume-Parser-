<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Sign Up</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{

            background:linear-gradient(
                135deg,
                #0f172a,
                #1e293b,
                #334155
            );

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            color:white;

            font-family:Arial;
        }

        .signup-card{

            width:400px;

            background:rgba(255,255,255,0.08);

            padding:40px;

            border-radius:20px;

            backdrop-filter:blur(10px);

            box-shadow:0 10px 30px rgba(0,0,0,0.4);
        }

        .title{

            text-align:center;

            margin-bottom:30px;

            font-size:32px;

            font-weight:bold;

            color:#38bdf8;
        }

        .form-control{

            margin-bottom:20px;

            padding:12px;

            border-radius:10px;

            border:none;
        }

        .btn-signup{

            width:100%;

            background:#38bdf8;

            border:none;

            padding:12px;

            color:white;

            font-weight:bold;

            border-radius:10px;
        }

        .btn-signup:hover{

            background:#0ea5e9;
        }

        .error{

            color:#ef4444;

            margin-bottom:15px;

            text-align:center;
        }

        .footer-text{

            text-align:center;

            margin-top:20px;
        }

        .footer-text a{

            color:#38bdf8;

            text-decoration:none;
        }

    </style>

</head>

<body>

<div class="signup-card">

    <div class="title">
        Create Account
    </div>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-info">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    {% if error %}
        <div class="error">
            {{ error }}
        </div>
    {% endif %}

    <form method="POST">

        <input type="email"
               name="email"
               class="form-control"
               placeholder="Enter Email"
               required>

        <input type="password"
               name="password"
               class="form-control"
               placeholder="Enter Password"
               required>

        <input type="password"
               name="confirm_password"
               class="form-control"
               placeholder="Confirm Password"
               required>

        <button type="submit"
                class="btn btn-signup">
            Sign Up
        </button>

    </form>

    <div class="footer-text">

        Already have an account?

        <a href="{{ url_for('login') }}">
            Login
        </a>

    </div>

</div>

</body>
</html>
