<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Job Creation Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #0f172a; color: white; padding-top: 50px; }
        .form-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); padding: 35px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .form-control, .form-select { background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255,255,255,0.2); color: white; }
        .form-control:focus, .form-select:focus { background: rgba(0, 0, 0, 0.4); color: white; border-color: #38bdf8; box-shadow: 0 0 8px rgba(56,189,248,0.5); }
        .btn-submit { background: #38bdf8; color: #0f172a; font-weight: 600; width: 100%; border: none; padding: 12px; border-radius: 8px; transition: 0.3s; }
        .btn-submit:hover { background: #0ea5e9; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="form-card">
                    <h3 class="mb-4 text-center" style="color: #38bdf8; font-weight: 700;">Post Active Headcount Opening</h3>
                    <p class="text-muted text-center small mb-4">Input data profiles directly into the predictive parsing pipeline</p>

                    <form action="{{ url_for('hr_add_job') }}" method="POST">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label small text-muted">Job Title</label>
                                <input type="text" name="title" class="form-control" placeholder="e.g. Data Analyst Intern" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small text-muted">Company Name</label>
                                <input type="text" name="company" class="form-control" placeholder="e.g. Google India" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small text-muted">Core Classification Domain Profile</label>
                            <select name="profile" class="form-select" required>
                                <option value="Data Analyst">Data Analyst</option>
                                <option value="AI/ML Engineer">AI/ML Engineer</option>
                                <option value="Full Stack Developer">Full Stack Developer</option>
                                <option value="Java Developer">Java Developer</option>
                                <option value="Cloud Engineer">Cloud Engineer</option>
                                <option value="Software Engineer">Software Engineer</option>
                            </select>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label small text-muted">Location</label>
                                <input type="text" name="location" class="form-control" placeholder="e.g. Pune, India" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small text-muted">Compensation Package</label>
                                <input type="text" name="salary" class="form-control" placeholder="e.g. ₹6,000,000/yr" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label small text-muted">Required Technical Skills (Comma Separated)</label>
                            <textarea name="skills" rows="3" class="form-control" placeholder="e.g. Python, SQL, Power BI, Pandas" required></textarea>
                            <div class="form-text text-muted small mt-1">The recommendation algorithm relies on exact intersections against these tags.</div>
                        </div>

                        <button type="submit" class="btn btn-submit">Save to Live Database Pipeline</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
